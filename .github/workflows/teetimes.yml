name: teetimes

on:
  schedule:
    - cron: "*/10 10-14 * * *"   # 3:00-7:59am PDT -> morning cutoff band
    - cron: "*/10 20-23 * * *"   # 1:00-4:59pm PDT -> evening cutoff band
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Take snapshot
        run: python teetimes.py snap

      - name: Rebuild the report
        run: python teetimes.py report > report.txt 2>&1

      - name: Commit the new rows
        run: |
          git config user.name  "teetimes-bot"
          git config user.email "teetimes-bot@users.noreply.github.com"
          git add snapshots.csv report.txt
          git diff --staged --quiet || git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase --autostash
          git push
